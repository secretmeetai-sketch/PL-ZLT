<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Web Push Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f2f2f7;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .box {
      text-align: center;
    }
    button {
      margin-top: 14px;
      font-size: 16px;
      padding: 12px 22px;
      border: none;
      border-radius: 12px;
      background: #007aff;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>Web Push Demo</h2>
  <p>PayPal • start in 5 sec • 10 push • PLN</p>
  <button onclick="startPushes()">Запустити push</button>
</div>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

async function startPushes() {
  const permission = await Notification.requestPermission();
  if (permission !== 'granted') return;

  const reg = await navigator.serviceWorker.ready;

  const amounts = [
    "55 zł", "60 zł", "75 zł", "140 zł", "125 zł",
    "330 zł", "153 zł", "140 zł", "85 zł", "50 zł"
  ];

  setTimeout(() => {
    amounts.forEach((amount, index) => {
      setTimeout(() => {
        reg.showNotification("FreeCash", {
          body: `Otrzymałeś nową płatność ${amount} z Moje ING mobile`,
          icon: "icon.png"
        });
      }, index * 1000);
    });
  }, 5000);
}
</script>

</body>
</html>
